<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>

</h:head>
<h:body>
	<ui:composition template="/template/Template.xhtml">

		<ui:define name="content">

			<!--Formulario principal-->

			<h:form id="frmPrincipal">

				<p:growl id="msgs" showDetail="true"
					skipDetailIfEqualsSummary="true" />

				<div class="card">

					<p:accordionPanel id="acco" widgetVar="basic">

						<p:tab title="REGISTRO DE LAVDORAS"
							titleStyle="font-size: .8rem; background-color: #1B2631; color: #F5F5F5">

							<h:panelGrid columns="3" cellpadding="4" styleClass="fuente">

								<p:outputLabel for="desc" value="No." />
								<p:inputText id="desc"
									value="#{lavadorasBean.lavadoras.descripcion}" required="true"
									requiredMessage="Número de equipo requerido"
									style="width: 4rem" />
								<p:message for="desc" showDetail="true" />

								<p:outputLabel for="nombreTipo" value="Tipo" />
								<p:selectOneMenu id="nombreTipo" required="true"
									requiredMessage="Tipo de equipo requerido"
									value="#{lavadorasBean.lavadoras.nombre}">
									<f:selectItem itemValue="" itemLabel="Selecciona" />
									<f:selectItem itemValue="Lavadora Grande"
										itemLabel="Lavadora Grande" />
									<f:selectItem itemValue="Lavadora Chica"
										itemLabel="Lavadora Chica" />
									<f:selectItem itemValue="Tambor" itemLabel="Tambor" />
								</p:selectOneMenu>
								<p:message for="nombreTipo" showDetail="true" />


								<p:outputLabel for="capacidad" value="Capacidad en kilos" />
								<p:inputText id="capacidad"
									value="#{lavadorasBean.lavadoras.capacidadKilos}"
									required="true" requiredMessage="Capacidad de kilos requerido"
									style="width: 5rem" />
								<p:message for="capacidad" showDetail="true" />


								<p:outputLabel value="" />
								<p:commandButton icon="pi pi-save" title="Guardar"
									value="GUARDAR"
									update="frmPrincipal, frmPrincipal:msgs, tblLavadoras"
									style="width: 6rem; height: 1.2rem"
									actionListener="#{lavadorasBean.guardar()}" />
							</h:panelGrid>


							<p:dataTable id="tblLavadoras" styleClass="tabla fuente"
								var="item" sortMode="multiple" scrollHeight="650"
								scrollWidth="60%" widgetVar="wbtblLavadoras"
								paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
								rowsPerPageTemplate="50,100,200,500" rows="50" paginator="true"
								liveScroll="true" rowHover="true" paginatorAlwaysVisible="true"
								scrollable="true"
								currentPageReportTemplate="Total: #{lavadorasBean.listarLavadoras.size()}"
								rowStyleClass="#{item.estado=='0' ? 'disponible' :null} #{item.estado=='1' ? 'ocupada' :null} #{item.estado=='2' ? 'mantenimiento' :null} #{item.estado=='3' ? 'sinuso' :null}"
								value="#{lavadorasBean.listarLavadoras}"
								emptyMessage="NO HAY REGISTROS">

								<p:column headerText="Acciones" width="1.5rem"
									exportable="false" style="text-align: center">
									<p:commandButton id="ed" icon="pi pi-fw pi-pencil"
										onclick="PF('dlgEditar').show()" update="frmEditar:pnlEditar"
										styleClass="ui-button-warning" process="@this"
										validateClient="false">
										<f:setPropertyActionListener value="#{item}"
											target="#{lavadorasBean.lavadorasEditar}" />

									</p:commandButton>
									<p:tooltip id="toolbr" for="br" value="Editar"
										trackMouse="true" />

									<p:commandButton id="br" icon="pi pi-fw pi-trash"
										actionListener="#{lavadorasBean.abrirPopup(item.descripcion, item.nombre)}"
										styleClass="ui-button-danger" process="@this"
										validateClient="false">
										<f:setPropertyActionListener value="#{item}"
											target="#{lavadorasBean.lavadoras}" />

									</p:commandButton>
									<p:tooltip for="br" value="Borrar" trackMouse="true" />

									<p:remoteCommand name="borrarLavadora" process="@this"
										validateClient="false"
										action="#{lavadorasBean.borrarLavadora}"
										update="frmPrincipal, frmPrincipal:msgs" />
								</p:column>

								<p:column headerText="No." width="2rem"
									style="text-align: center">
									<h:outputText value="#{item.descripcion}" />
								</p:column>

								<p:column headerText="Tipo" width="4rem"
									filterBy="#{item.nombre}" filterMatchMode="exact">
									<f:facet name="filter">
										<p:selectOneMenu onchange="PF('wbtblLavadoras').filter()"
											autoWidth="false">
											<f:selectItem itemLabel="Todos" itemValue="#{null}"
												noSelectionOption="true" />
											<f:selectItems value="#{lavadorasBean.tiposLavadora}" />
										</p:selectOneMenu>
									</f:facet>
									<h:outputText value="#{item.nombre}" />
								</p:column>


								<p:column headerText="Capacidad (Kg)" width="4rem"
									style="text-align: center">
									<h:outputText value="#{item.capacidadKilos}" />
								</p:column>

								<p:column headerText="Estatus Operativo" width="5rem"
									style="text-align: center">
									<h:outputText
										value="#{item.estado eq 0 ? 'Vacía' : (item.estado eq 1 ? 'En proceso' : (item.estado eq 2 ? 'En Mantenimiento' : (item.estado eq 3 ? 'Fuera de Servicio' : (item.estado eq 4 ? 'Otro' : 'Retirada'))))}" />
								</p:column>

								<p:column headerText="Etapa" width="10rem">
									<h:outputText value="#{item.etapa}" />
								</p:column>

							</p:dataTable>

						</p:tab>

					</p:accordionPanel>



				</div>


			</h:form>

			<!-- INICIA FORMULARIO PARA EDITAR -->
			<h:form id="frmEditar">
				<p:dialog header="ACTUALIZAR INFORMACIÓN DE LA LAVADORA"
					widgetVar="dlgEditar" showEffect="fade" closeOnEscape="true"
					minimizable="true" maximizable="true">
					<h:panelGrid id="pnlEditar" columns="1" styleClass="fuente">

						<p:outputLabel for="no" value="No." />
						<p:inputText id="no"
							value="#{lavadorasBean.lavadorasEditar.descripcion}"
							required="false" requiredMessage="Campo requerido"
							style="width: 5rem" />
						<p:message for="no" />

						<p:outputLabel for="tipo" value="Tipo" />
						<p:inputText id="tipo"
							value="#{lavadorasBean.lavadorasEditar.nombre}" required="false"
							requiredMessage="Campo requerido" style="width: 20rem" />
						<p:message for="tipo" />

						<p:outputLabel for="capacidad" value="Capacidad (Kg)" />
						<p:inputText id="capacidad"
							value="#{lavadorasBean.lavadorasEditar.capacidadKilos}"
							required="false" requiredMessage="Campo requerido"
							style="width: 5rem" />
						<p:message for="capacidad" />

						<p:outputLabel for="estado" value="Estatus Operativo" />
						<p:inputText id="estado"
							value="#{lavadorasBean.lavadorasEditar.estado}" required="false"
							requiredMessage="Campo requerido" style="width: 10rem" />
						<p:message for="estado" />

						<p:outputLabel for="etapa" value="Etapa" />
						<p:inputText id="etapa"
							value="#{lavadorasBean.lavadorasEditar.etapa}" required="false"
							requiredMessage="Campo requerido" style="width: 10rem" />
						<p:message for="etapa" />



					</h:panelGrid>

					<div style="text-align: right">
						<p:commandButton icon="pi pi-save" value="Actualizar"
							style="widht: 20rem; height: 2rem" title="Guardar"
							update="frmPrincipal, frmPrincipal:msgs"
							actionListener="#{lavadorasBean.actualizar()}"
							oncomplete="PF('dlgEditar').hide()" />
					</div>

				</p:dialog>
			</h:form>
			<!-- FINALIZA FORMULARIO PARA EDITAR -->




		</ui:define>
	</ui:composition>
</h:body>
</html>
